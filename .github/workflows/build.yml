# .github/workflows/build.yml
name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - '.gitignore'
  
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: false
        default: ''

jobs:
  build:
    name: Build Windows Package
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
      
      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}") {
            $VERSION = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_name }}" -match '^v') {
            $VERSION = "${{ github.ref_name }}"
          } else {
            $VERSION = "dev-${{ github.sha }}".Substring(0, 7)
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $VERSION"
      
      - name: Build Windows EXE
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        shell: cmd
        run: |
          mkdir dist 2>nul
          set CGO_ENABLED=0
          set GOOS=windows
          set GOARCH=amd64
          
          go build -trimpath -ldflags "-s -w -X main.version=%VERSION%" -o dist\lumine.exe .
          echo Build complete
      
      - name: Copy config files
        shell: pwsh
        run: |
          Copy-Item "config.json" "dist/config.json" -ErrorAction SilentlyContinue
          Copy-Item "config_pool.json" "dist/config_pool.json" -ErrorAction SilentlyContinue
          Copy-Item "NOTICE" "dist/NOTICE" -ErrorAction SilentlyContinue
          Copy-Item "README.md" "dist/README.md" -ErrorAction SilentlyContinue
          Copy-Item "README_zh.md" "dist/README_zh.md" -ErrorAction SilentlyContinue
          
          Get-ChildItem "dist"
      
      - name: Create ZIP package
        shell: pwsh
        run: |
          $VERSION = "${{ steps.get_version.outputs.VERSION }}"
          $ZIP_NAME = "lumine-$VERSION-windows-amd64.zip"
          
          Compress-Archive -Path "dist/*" -DestinationPath $ZIP_NAME -Force
          Write-Host "Created: $ZIP_NAME"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumine-windows-${{ steps.get_version.outputs.VERSION }}
          path: lumine-*.zip
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: lumine-*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
